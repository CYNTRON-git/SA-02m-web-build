server {
    # default_server — при втором vhost на том же порту отвечает этот блок (иначе 403 из «чужого» root)
    listen __PORT__ default_server;
    server_name _;
    root __WEB_ROOT__;
    index index.html;

    charset utf-8;

    # ── Static assets (CSS, JS, images) ────────────────────────────────────
    location /static/ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── Login page (no auth) ────────────────────────────────────────────────
    location = /login.html { try_files $uri =404; }

    # Старые закладки /cgi-bin/index.cgi — без fcgiwrap (устраняет 403 если файла нет или не +x)
    location = /cgi-bin/index.cgi {
        return 302 /;
    }

    # ── CGI backend ─────────────────────────────────────────────────────────
    # include первым: дистрибутивный fastcgi_params не должен перетирать наши значения «сверху»
    location /cgi-bin/ {
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param  HTTP_COOKIE     $http_cookie;
        fastcgi_pass   unix:/run/fcgiwrap.socket;
    }

    # ── Внутренняя проверка авторизации для API flasher ─────────────────────
    location = /_auth_check {
        internal;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME $document_root/cgi-bin/auth_check.cgi;
        fastcgi_param  HTTP_COOKIE     $http_cookie;
        fastcgi_pass   unix:/run/fcgiwrap.socket;
    }

    # ── Flasher API (демон sa02m-flasher, unix-socket) ──────────────────────
    # SSE-эндпоинт вынесен отдельно: отключаем буферизацию и увеличиваем таймаут чтения.
    location ~ ^/api/flasher/jobs/[^/]+/events$ {
        auth_request /_auth_check;
        proxy_pass http://unix:/run/sa02m-flasher.sock:$request_uri;
        rewrite ^/api/flasher(/.*)$ $1 break;
        proxy_http_version 1.1;
        proxy_set_header   Host          $host;
        proxy_set_header   Cookie        $http_cookie;
        proxy_set_header   X-Real-IP     $remote_addr;
        proxy_set_header   Connection    "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    location /api/flasher/ {
        auth_request /_auth_check;
        rewrite ^/api/flasher/(.*)$ /$1 break;
        proxy_pass http://unix:/run/sa02m-flasher.sock;
        proxy_http_version 1.1;
        proxy_set_header   Host          $host;
        proxy_set_header   Cookie        $http_cookie;
        proxy_set_header   X-Real-IP     $remote_addr;
        proxy_request_buffering off;
        client_max_body_size 8m;
        proxy_read_timeout 300s;
    }

    # ── SPA fallback (everything → index.html) ──────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/sa02m_access.log;
    error_log  /var/log/nginx/sa02m_error.log warn;
}
