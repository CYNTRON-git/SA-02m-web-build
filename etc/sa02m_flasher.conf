# -*- конфигурация sa02m-flasher.service -*-
# Формат: KEY=VALUE (как /etc/sa02m_hw.conf). Все поля не обязательны — см. config.py.

# Путь к unix-сокету, который слушает демон. Должен совпадать с nginx network_config.conf.
SOCKET_PATH=/run/sa02m-flasher.sock

# Каталог локального кеша прошивок.
CACHE_DIR=/var/lib/sa02m-flasher/firmware

# Каталог логов демона (logrotate — см. /etc/logrotate.d/sa02m-flasher).
LOG_DIR=/var/log/sa02m-flasher

# Адрес lock-файлов (по порту: /var/lock/sa02m-flasher-COM1.lock и т.д.).
LOCK_DIR=/var/lock

# URL манифеста прошивок (index.json) и базовый URL для относительных ссылок.
MANIFEST_URL=https://cyntron.ru/upload/medialibrary/cyntron/firmware/index.json
FIRMWARE_BASE_URL=https://cyntron.ru/upload/medialibrary/cyntron/firmware/

# Службы, которые требуется остановить на время сканирования/прошивки (разделитель — пробел или запятая).
# Именно эти службы опрашивают RS-485 и конфликтуют с flasher-ом за порт.
MPLC_STOP_SERVICES=mplc.service

# Страховочный тайм-аут на одну задачу (сек). По истечении — задача помечается ERROR, служба остаётся живой.
MAX_JOB_SECONDS=1800

# Авторизация:
#  SESSION_COOKIE — ожидаемая пара cookie (та же, что проверяют CGI *.cgi).
#  INTERNAL_TOKEN — общий секрет nginx↔демон (в заголовке X-SA02M-Auth). Если пусто — проверка только cookie.
SESSION_COOKIE=session_token=cyntron_session
INTERNAL_TOKEN=
