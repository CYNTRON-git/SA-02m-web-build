# ═══════════════════════════════════════════════════════════════════════════
# /etc/sa02m_network.conf  —  Настройки сетевого watchdog СА-02м
# Этот файл опционален. Раскомментируйте нужные строки.
# ═══════════════════════════════════════════════════════════════════════════

# Интервал проверки интерфейсов (секунды, по умолчанию 30)
# WATCHDOG_INTERVAL=30

# Cooldown между попытками восстановления одного интерфейса (секунды)
# RECOVER_COOLDOWN=60

# ── Пинг-цели для проверки связности ─────────────────────────────────────
#
# Если у интерфейса в interfaces.d задан gateway, по умолчанию пингуется он.
# Эти переменные позволяют задать другую цель или отключить пинг:
#
#   WATCHDOG_PING_<IFACE>=<IP>    — пинговать этот IP вместо шлюза
#   WATCHDOG_PING_<IFACE>=skip    — пропустить пинг для этого интерфейса
#
# Примеры:
#   eth0 — основная сеть, шлюз 192.168.1.1 (достаточно задать gateway в eth0.conf)
# WATCHDOG_PING_ETH0=192.168.1.1

#   eth1 — локальная сеть без шлюза, пинговать конкретное устройство
# WATCHDOG_PING_ETH1=10.0.0.2

#   eth1 — только carrier+IP, не пинговать вообще
# WATCHDOG_PING_ETH1=skip
