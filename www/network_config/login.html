<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>СА-02м — Вход</title>
  <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>

<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <svg viewBox="0 0 32 32" width="32" height="32" fill="none">
        <rect width="32" height="32" rx="10" fill="#0891b2"/>
        <path d="M9 16h14M16 9v14" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <div>
        <h1 style="font-size:1rem;font-weight:700;color:#f2f2f7;line-height:1.2">СА-02м</h1>
        <p style="font-size:.72rem;color:#8e8e93;margin-top:1px">Сервер автоматизации ЦИНТРОН</p>
      </div>
    </div>

    <div id="login-error" class="login-error" style="display:none">
      Неверный логин или пароль
    </div>

    <form id="login-form" method="POST" action="/cgi-bin/login.cgi">
      <div class="field">
        <label for="username">Логин</label>
        <input id="username" name="username" type="text" autocomplete="username"
               placeholder="admin" required>
      </div>
      <div class="field">
        <label for="password">Пароль</label>
        <input id="password" name="password" type="password" autocomplete="current-password"
               placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary login-btn">Войти</button>
    </form>

  </div>
</div>

<script>
if (new URLSearchParams(location.search).get('error')) {
  document.getElementById('login-error').style.display = 'block';
}
if (document.cookie.split(';').some(c => c.trim().startsWith('session_token='))) {
  window.location.replace('/');
}
</script>
</body>
</html>
