<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>СА-02м — Вход</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon_cyntron.svg?v=1.0.2">
  <link rel="stylesheet" href="/static/css/main.css?v=1.0.2">
  <script>try{if(localStorage.getItem('sa02m-theme')==='light')document.documentElement.setAttribute('data-theme','light');}catch(e){}</script>
</head>
<body>

<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <img class="login-logo-img" src="/static/favicon_cyntron.svg?v=1.0.2" width="56" height="56" alt="ЦИНТРОН">
      <div>
        <h1 class="login-logo-title">СА-02м</h1>
        <p class="login-logo-sub">Сервер автоматизации ЦИНТРОН</p>
      </div>
    </div>

    <div id="login-error" class="login-error" style="display:none">
      Неверный логин или пароль
    </div>

    <form id="login-form" method="POST" action="/cgi-bin/login.cgi">
      <div class="field">
        <label for="username">Логин</label>
        <input id="username" name="username" type="text" autocomplete="username"
               placeholder="admin" required>
      </div>
      <div class="field">
        <label for="password">Пароль</label>
        <input id="password" name="password" type="password" autocomplete="current-password"
               placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary login-btn">Войти</button>
    </form>

  </div>
</div>

<script>
const PRIORITY_WARMUP_KEY = 'sa02m-priority-warmup';
function readWarmupCache() {
  try {
    return JSON.parse(sessionStorage.getItem(PRIORITY_WARMUP_KEY) || '{}');
  } catch (e) {
    return {};
  }
}
function writeWarmupPart(part, data) {
  try {
    const cache = readWarmupCache();
    cache[part] = { ts: Date.now(), data };
    sessionStorage.setItem(PRIORITY_WARMUP_KEY, JSON.stringify(cache));
  } catch (e) {}
}
function prefetchPriorityPart(part) {
  fetch('/cgi-bin/status.cgi?part=' + encodeURIComponent(part), { cache: 'no-store', credentials: 'omit' })
    .then(r => r.json())
    .then(d => { if (!d.error) writeWarmupPart(part, d); })
    .catch(() => {});
}
function prefetchPriorityWidgets() {
  prefetchPriorityPart('cpu');
  setTimeout(() => prefetchPriorityPart('temp'), 40);
  setTimeout(() => prefetchPriorityPart('ram'), 80);
  setTimeout(() => prefetchPriorityPart('disk'), 120);
}

if (new URLSearchParams(location.search).get('error')) {
  document.getElementById('login-error').style.display = 'block';
}
if (document.cookie.split(';').some(c => c.trim().startsWith('session_token='))) {
  window.location.replace('/');
} else {
  prefetchPriorityWidgets();
  setInterval(prefetchPriorityWidgets, 5000);
}
</script>
</body>
</html>
